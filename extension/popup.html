<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boss直聘AI投递助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; min-height: 400px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
    .header { text-align: center; color: white; margin-bottom: 20px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.8; margin-top: 5px; }
    
    .section { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .section-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; width: 4px; height: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 2px; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
    .form-group textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 12px; resize: none; font-family: inherit; }
    .form-group input[type="text"], .form-group select { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 12px; }
    
    .skills-container { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag { background: #f0f0f0; color: #666; padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .skill-tag:hover { background: #667eea; color: white; }
    .skill-tag.active { background: #667eea; color: white; }
    
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    .btn-secondary { background: #f5f5f5; color: #666; }
    .btn-secondary:hover { background: #eee; }
    
    .status { text-align: center; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #ffebee; color: #c62828; }
    .status.info { background: #e3f2fd; color: #1565c0; }
    
    .stats { display: flex; justify-content: space-around; margin-top: 15px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 20px; font-weight: 700; color: white; }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.8); }
    
    .toggle-group { display: flex; gap: 8px; }
    .toggle-btn { flex: 1; padding: 8px; border: 1px solid #eee; border-radius: 8px; font-size: 12px; background: white; cursor: pointer; transition: all 0.2s; }
    .toggle-btn.active { background: #667eea; color: white; border-color: #667eea; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Boss AI投递助手</h1>
    <p>智能匹配 · 一键投递</p>
  </div>
  
  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="matchCount">0</div>
      <div class="stat-label">匹配岗位</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="appliedCount">0</div>
      <div class="stat-label">已投递</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="successCount">0</div>
      <div class="stat-label">已回复</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">我的技能</div>
    <div class="skills-container" id="skillsContainer">
      <span class="skill-tag" data-skill="Java">Java</span>
      <span class="skill-tag" data-skill="Python">Python</span>
      <span class="skill-tag" data-skill="Spring">Spring</span>
      <span class="skill-tag" data-skill="Vue">Vue</span>
      <span class="skill-tag" data-skill="React">React</span>
      <span class="skill-tag" data-skill="MySQL">MySQL</span>
      <span class="skill-tag" data-skill="Redis">Redis</span>
      <span class="skill-tag" data-skill="Docker">Docker</span>
      <span class="skill-tag" data-skill="Git">Git</span>
      <span class="skill-tag" data-skill="JavaScript">JavaScript</span>
    </div>
    <div class="form-group" style="margin-top: 12px;">
      <label>其他技能（用逗号分隔）</label>
      <input type="text" id="customSkills" placeholder="如：Go, Rust, Kubernetes">
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">求职意向</div>
    <div class="form-group">
      <label>目标职位</label>
      <input type="text" id="targetPosition" placeholder="如：Java开发工程师">
    </div>
    <div class="form-group">
      <label>工作经验</label>
      <select id="experience">
        <option value="">不限</option>
        <option value="1-3">1-3年</option>
        <option value="3-5">3-5年</option>
        <option value="5-10">5-10年</option>
        <option value="10+">10年以上</option>
      </select>
    </div>
    <div class="form-group">
      <label>期望薪资</label>
      <input type="text" id="salary" placeholder="如：15k-25k">
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">自我介绍模板</div>
    <div class="form-group">
      <textarea id="introTemplate" placeholder="您好，我对贵公司的这个职位非常感兴趣。我具备以下技能：&#10;{skills}&#10;期待能有机会进一步交流！"></textarea>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">投递设置</div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="autoMatchBtn">智能匹配</button>
      <button class="toggle-btn" id="manualMatchBtn">手动筛选</button>
    </div>
    <div class="form-group" style="margin-top: 12px;">
      <label>匹配度阈值（%）</label>
      <input type="text" id="matchThreshold" value="60" style="width: 80px;">
    </div>
  </div>
  
  <button class="btn btn-primary" id="startBtn">🚀 开始投递</button>
  <button class="btn btn-secondary" id="resetBtn">重置统计</button>
  
  <div class="status" id="status" style="display: none;"></div>
  
  <script src="popup.js"></script>
</body>
</html>
